name: MXNJPY監視

on:
  schedule:
    # JST 8〜23時（毎時）= UTC 23,0-14時 ※平日のみ
    - cron: '0 0-14,23 * * 1-5'
  workflow_dispatch:  # 手動実行も可能

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # state/fx-prev.txt をコミットするため
    steps:
      - uses: actions/checkout@v4

      - name: MXNJPYレート取得・アラート判定
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python3 scripts/fx-monitor.py

      - name: 前回価格を保存（コミット）
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add state/fx-prev.txt
          git diff --staged --quiet || git commit -m "chore: update fx state" && git push
